hero:
  titulo: "Uma casa pensada pra ser sua. Projetada com atenção a cada detalhe, do conceito à obra."
  descricao: "Combinamos rigor técnico, sensibilidade artística e leitura de contexto para famílias que não buscam apenas metros quadrados, mas uma casa com identidade própria."
  m2: "+100.000 m²"
  projetos: "+50 projetos"
  anos: "5 anos"
  cta_texto: "Quero conversar sobre meu projeto"
  imagem: "odisse-obras-005.jpg"

diferencial:
  titulo: "Cada projeto, um mundo próprio"
  descricao: "Não trabalhamos com fórmulas prontas nem com análises de contexto estereotipadas. Cada residência nasce do encontro entre o terreno que você ocupa, a sua história e o modo como pretende viver daqui pra frente. O resultado: uma casa com identidade própria — enraizada no seu contexto, construída para durar e valorizar o que você investiu nela."
  itens:
    - numero: "I."
      titulo: "Rigor técnico"
      texto: "Projetos executivos completos, do conceito à obra — com o seu orçamento sob controle em cada etapa."
    - numero: "II."
      titulo: "Leitura de contexto"
      texto: "Terreno, entorno e o seu modo de viver — analisados antes de qualquer traço."
    - numero: "III."
      titulo: "Sensibilidade artística"
      texto: "Mais do que uma solução: arquitetura como linguagem que expressa quem você é."

prova_visual:
  titulo: "Projetos que já ganharam forma"
  descricao: "Uma seleção do que já criamos em diferentes lugares do país."
  cta_texto: "Ver meu projeto tomar essa forma"

etapas:
  titulo: "Do conceito à obra, em quatro passos."
  descricao: "Cada projeto passa por um processo com começo, meio e entrega definidos. Você aprova cada etapa antes de avançarmos para a próxima — sem surpresas no caminho."
  itens:
    - numero: "I."
      titulo: "Conceito"
      texto: "Entendemos o terreno, as necessidades da sua família e o modo de viver de quem vai habitar a casa. Você já acompanha os primeiros estudos e volumes — a forma da residência começa a aparecer diante de você."
    - numero: "II."
      titulo: "Projeto Legal"
      texto: "Documentação técnica completa para aprovação junto à prefeitura e aos órgãos competentes."
    - numero: "III."
      titulo: "Projeto Executivo"
      texto: "Detalhamento técnico completo — plantas, cortes, fachadas e memorial descritivo — com cronograma definido junto com você, pronto para a obra."
    - numero: "IV."
      titulo: "Acompanhamento"
      texto: "Suporte técnico durante a execução, com visitas à obra até a entrega."

escopo:
  titulo: "O que você recebe"
  descricao: "Um serviço completo, sem lacunas entre o projeto e a obra:"
  itens:
    - "Projeto do conceito à execução"
    - "Acompanhamento da aprovação junto à prefeitura"
    - "Compatibilização com projetos complementares (elétrico, hidráulico, estrutural) — resolvido no papel, antes da obra começar."
    - "Suporte técnico até a entrega da obra"
  imagem: "escopo-documentacao-tecnica.jpg"

obras_secao:
  titulo: "Acompanhamos até o último detalhe ser erguido"
  descricao: "Um projeto não termina na entrega das plantas. Continuamos presentes durante toda a execução, com suporte técnico à construtora e à equipe de obra, seja esclarecendo dúvidas, seja em visitas técnicas à obra, para que o projeto tenha o suporte necessário para se tornar realidade como foi desenhado."

arquitetos:
  titulo: "Os Arquitetos"
  descricao: "Cid Clementino e Nathalia Linhares conduzem pessoalmente cada projeto residencial, do primeiro traço à entrega da obra. Ambos são arquitetos e urbanistas formados pela Universidade Federal da Paraíba e coordenam o Odisse, Estúdio de Arquitetura e Design (CAU PJ 670011).
Juntos, já assinaram mais de 50 projetos — de reformas e ambientações a residências e edifícios institucionais, como a sede administrativa da VRV. Cid é coordenador criativo do estúdio, com experiência em consultoria arquitetônica para incorporadoras; Nathalia é coordenadora executiva, com passagem pela gestão de projeto e obra em reformas de condomínios residenciais verticais.
Em 2023, o Odisse participou da CASACOR Paraíba, onde recebeu o prêmio de Melhor Uso de Materiais Inovadores e foi finalista do Prêmio Salão Design."
  nomes: "CID CLEMENTINO · NATHALIA LINHARES"
  imagem: "odisse-arquitetos-003.jpg"

numeros:
  - valor: "+100.000 m²"
    legenda: "de arquitetura projetada"
  - valor: "+50 projetos"
    legenda: "entregues"
  - valor: "5 anos"
    legenda: "de atuação contínua"

cta_final:
  titulo: "Vamos começar seu projeto?"
  descricao: "Conte um pouco sobre a sua residência — cidade do terreno, momento do projeto — e fale diretamente com o Odisse pelo WhatsApp."
  cta_texto: "Falar no WhatsApp"
